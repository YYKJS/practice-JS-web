<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JSの練習</title>
</head>
<body>
    <h1>JavaScriptの練習ページ</h1>
    <!-- クリックしたらJSの関数を実行するボタン -->
    <button onclick="sayHello()">ボタンを押してみてね</button>

    <!-- JavaScriptファイルを読み込む -->
    <script src="script.js"></script>
</body>
</html>
