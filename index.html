<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JSの練習</title>
</head>
<body>
    <!-- id="title" という目印を付けました -->
    <h1 id="title">JavaScriptの練習ページ</h1>

    <!-- ボタンを押したときに実行する関数名を changeText に変更しました -->
    <button onclick="changeText()">文字を変えてみる</button>

    <script src="script.js"></script>
</body>
</html>
